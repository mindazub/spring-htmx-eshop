spring.application.name=simple-htmx-crud-auth

# Server Configuration
server.port=8087
server.servlet.context-path=/

# Database Configuration (Default H2 for local dev)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# Logging
logging.level.root=INFO
logging.level.mindaz.simplehtmxcrudauth=DEBUG
logging.level.org.springframework.security=DEBUG

# Session Management (Similar to Laravel)
# Session store: none = memory (for development), use 'jdbc' for production persistence
spring.session.store-type=none
# Session timeout: 30 minutes of inactivity before automatic logout
server.servlet.session.timeout=30m
# Cookie configuration for secure session tracking
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
# Persistent session tracking across requests
server.servlet.session.persistent=true

