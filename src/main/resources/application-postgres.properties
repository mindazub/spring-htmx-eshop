spring.application.name=simple-htmx-crud-auth

# Server Configuration
server.port=8087
server.servlet.context-path=/

# Database Configuration - PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres:5432/techeco_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=techapp
spring.datasource.password=techapp_pass_2024

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# Logging
logging.level.root=INFO
logging.level.mindaz.simplehtmxcrudauth=DEBUG
logging.level.org.springframework.security=DEBUG

# Session Management
spring.session.store-type=none
server.servlet.session.timeout=30m


