<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TechEcom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">TechEcom Admin</h1>
            <div class="flex items-center space-x-4">
                <span class="text-gray-700" sec:authentication="name"></span>
                <form action="/logout" method="post" class="inline">
                    <button type="submit" class="text-red-600 hover:text-red-700">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold mb-8">Admin Dashboard</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Stats Cards -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-gray-600 font-semibold mb-2">Total Users</h3>
                <p class="text-4xl font-bold text-blue-600" th:text="${#lists.size(users)}"></p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-gray-600 font-semibold mb-2">Recent Events</h3>
                <p class="text-4xl font-bold text-green-600" th:text="${#lists.size(auditLogs)}"></p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-gray-600 font-semibold mb-2">System Status</h3>
                <p class="text-4xl font-bold text-green-600">✓ Online</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- User Management -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-4">User Management</h2>
                <a href="/admin/users" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 mb-4 inline-block">
                    Manage Users →
                </a>
                <div class="space-y-2 max-h-64 overflow-y-auto">
                    <div th:each="user : ${#lists.subList(users, 0, #lists.size(users) > 5 ? 5 : #lists.size(users))}"
                         class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                        <div>
                            <p class="font-semibold" th:text="${user.fullName}"></p>
                            <p class="text-sm text-gray-600" th:text="${user.email}"></p>
                        </div>
                        <span class="text-sm bg-blue-100 text-blue-800 px-3 py-1 rounded-full" th:text="${#lists.size(user.roles) > 0 ? user.roles.toList()[0] : 'USER'}"></span>
                    </div>
                </div>
            </div>

            <!-- Real-time Activity -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-4">Real-time Activity</h2>
                <a href="/admin/audit" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 mb-4 inline-block">
                    View All Logs →
                </a>
                <div id="auditLogContainer" class="space-y-2 max-h-64 overflow-y-auto">
                    <div th:each="log : ${#lists.subList(auditLogs, 0, #lists.size(auditLogs) > 5 ? 5 : #lists.size(auditLogs))}"
                         class="p-3 bg-gray-50 rounded-lg border-l-4 border-blue-600">
                        <p class="font-semibold text-sm" th:text="${log.eventType}"></p>
                        <p class="text-sm text-gray-600" th:text="${log.userEmail}"></p>
                        <p class="text-xs text-gray-500" th:text="${#temporals.format(log.timestamp, 'HH:mm:ss')}"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-12">
        <p>&copy; 2024 TechEcom. All rights reserved.</p>
    </footer>

    <script th:inline="javascript">
        // Connect to WebSocket for real-time updates
        function connectWebSocket() {
            const socket = new SockJS('/ws/audit');
            const stompClient = Stomp.over(socket);

            stompClient.connect({}, function() {
                console.log('Connected to audit stream');
                stompClient.subscribe('/topic/audit-log', function(message) {
                    console.log('New audit event:', message.body);
                    // Auto-refresh audit logs (simple approach)
                    setTimeout(() => location.reload(), 2000);
                });
            }, function(error) {
                console.log('WebSocket connection error:', error);
            });
        }

        connectWebSocket();
    </script>
</body>
</html>
