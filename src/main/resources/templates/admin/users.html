<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - TechEcom Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">TechEcom Admin</h1>
            <div class="flex items-center space-x-4">
                <a href="/admin" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                <span class="text-gray-700" sec:authentication="name"></span>
                <form action="/logout" method="post" class="inline">
                    <button type="submit" class="text-red-600 hover:text-red-700">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold mb-8">User Management</h1>

        <div th:if="${success}" class="mb-4 p-4 bg-green-100 text-green-700 rounded-lg">
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="mb-4 p-4 bg-red-100 text-red-700 rounded-lg">
            <span th:text="${error}"></span>
        </div>

        <!-- Create New User Form -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4">Create New User</h2>
            <form action="/admin/users/create" method="post" class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
                    <input type="text" name="fullName" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Email</label>
                    <input type="email" name="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Password</label>
                    <input type="password" name="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Role</label>
                    <select name="role" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="USER">User</option>
                        <option value="MANAGER">Manager</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button type="submit" class="w-full bg-green-600 text-white font-semibold py-2 rounded-lg hover:bg-green-700">
                        Create User
                    </button>
                </div>
            </form>
        </div>

        <!-- Users Table -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-100 border-b">
                        <tr>
                            <th class="px-6 py-3 text-left font-semibold text-gray-700">Name</th>
                            <th class="px-6 py-3 text-left font-semibold text-gray-700">Email</th>
                            <th class="px-6 py-3 text-left font-semibold text-gray-700">Roles</th>
                            <th class="px-6 py-3 text-left font-semibold text-gray-700">Last Login</th>
                            <th class="px-6 py-3 text-left font-semibold text-gray-700">Status</th>
                            <th class="px-6 py-3 text-left font-semibold text-gray-700">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}" class="border-b hover:bg-gray-50">
                            <td class="px-6 py-3" th:text="${user.fullName}"></td>
                            <td class="px-6 py-3" th:text="${user.email}"></td>
                            <td class="px-6 py-3">
                                <div class="flex gap-2 flex-wrap">
                                    <span th:each="role : ${user.roles}" class="text-xs bg-blue-100 text-blue-800 px-3 py-1 rounded-full" th:text="${role}"></span>
                                </div>
                            </td>
                            <td class="px-6 py-3" th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt, 'yyyy-MM-dd HH:mm') : 'Never'}"></td>
                            <td class="px-6 py-3">
                                <span class="text-sm px-3 py-1 rounded-full" th:classappend="${user.enabled} ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'" th:text="${user.enabled} ? 'Active' : 'Inactive'"></span>
                            </td>
                            <td class="px-6 py-3 space-x-2">
                                <div class="flex gap-2 flex-wrap">
                                    <form th:action="@{/admin/users/{id}/role/MANAGER(id=${user.id})}" method="post" class="inline">
                                        <button type="submit" class="text-sm bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700" th:unless="${user.roles.contains('MANAGER')}">
                                            Add Manager
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="inline"
                                          onsubmit="return confirm('Are you sure?')">
                                        <button type="submit" class="text-sm bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">
                                            Delete
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-12">
        <p>&copy; 2024 TechEcom. All rights reserved.</p>
    </footer>
</body>
</html>
