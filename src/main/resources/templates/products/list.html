<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - TechEcom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <h1 class="text-2xl font-bold text-blue-600">TechEcom</h1>
                <a href="/products" class="text-gray-700 hover:text-blue-600 font-semibold">Products</a>
            </div>
            <div class="flex items-center space-x-4">
                <form action="/products/search" method="get" class="flex">
                    <input type="text" name="query" placeholder="Search..." th:value="${searchQuery}" class="px-4 py-2 border border-gray-300 rounded-l-lg focus:outline-none">
                    <input type="hidden" name="size" th:value="${pageSize}">
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-r-lg hover:bg-blue-700">Search</button>
                </form>
                <a th:if="${authenticated}" href="/cart" class="text-gray-700 hover:text-blue-600">
                    <span class="bg-blue-600 text-white rounded-full px-3 py-1">🛒</span>
                </a>
                <a th:unless="${authenticated}" href="/login" class="text-gray-700 hover:text-blue-600">
                    <span class="bg-gray-600 text-white rounded-full px-3 py-1">🛒</span>
                </a>
                <a th:if="${admin}" href="/admin" class="text-gray-700 hover:text-blue-600 font-semibold">Admin</a>
                <div th:if="${authenticated}" class="flex items-center space-x-4">
                    <a href="/account" class="text-gray-700 hover:text-blue-600 font-semibold">My Account</a>
                    <span class="text-gray-700" th:text="${currentUserEmail}"></span>
                    <form action="/logout" method="post" class="inline">
                        <button type="submit" class="text-red-600 hover:text-red-700">Logout</button>
                    </form>
                </div>
                <div th:unless="${authenticated}" class="flex items-center space-x-3">
                    <a href="/login" class="text-blue-600 hover:text-blue-700 font-semibold">Login</a>
                    <a href="/register" class="text-gray-700 hover:text-blue-600">Register</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div th:if="${notice != null}" class="mb-4 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-green-800" th:text="${notice}"></div>
        <div th:if="${favoriteMessage != null}" class="mb-4 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-green-800" th:text="${favoriteMessage}"></div>
        <div th:if="${favoriteError != null}" class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-800" th:text="${favoriteError}"></div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
            <!-- Sidebar - Categories -->
            <aside class="md:col-span-1">
                <div class="bg-white rounded-lg shadow-md p-4">
                    <h3 class="text-lg font-bold mb-4">Categories</h3>
                    <div class="space-y-2">
                        <a href="/products" class="block text-blue-600 hover:text-blue-700 font-semibold">All Products</a>
                        <div th:each="category : ${categories}" class="hover:bg-gray-100 p-2 rounded cursor-pointer">
                            <a th:href="@{/products/category/{id}(id=${category.id})}"
                               th:text="${category.name}"
                               th:classappend="${listType == 'category' and currentCategoryId == category.id} ? ' font-semibold text-blue-600' : ''"
                               class="text-gray-700 hover:text-blue-600"></a>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Content - Products -->
            <div class="md:col-span-3">
                <h2 class="text-3xl font-bold mb-8" th:text="${searchQuery != null ? 'Search Results for: ' + searchQuery : 'All Products'}"></h2>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div th:each="product : ${products}" class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
                        <!-- Product Image -->
                        <div class="bg-gray-200 h-48 flex items-center justify-center overflow-hidden">
                            <img th:src="${product.images.size() > 0 and !#strings.isEmpty(product.images[0].imageUrl) ? product.images[0].imageUrl : '/images/product-placeholder.svg'}"
                                 alt="Product Image"
                                 onerror="this.onerror=null;this.src='/images/product-placeholder.svg';"
                                 class="w-full h-full object-cover">
                        </div>

                        <!-- Product Info -->
                        <div class="p-4">
                            <h3 class="font-bold text-lg mb-2 line-clamp-2" th:text="${product.name}"></h3>
                            <p class="text-gray-600 text-sm mb-3 line-clamp-2" th:text="${product.description}"></p>

                            <div class="flex justify-between items-center mb-3">
                                <span class="text-2xl font-bold text-blue-600" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></span>
                                <span class="text-yellow-500" th:text="'⭐ ' + ${#numbers.formatDecimal(product.rating, 1, 1)}"></span>
                            </div>

                            <div class="space-y-2">
                                <a th:href="@{/products/{id}(id=${product.id})}"
                                   class="block w-full bg-blue-600 text-white text-center py-2 rounded-lg hover:bg-blue-700">
                                   View Details
                                </a>
                                <form th:if="${authenticated}" th:action="@{/favorites/toggle/{id}(id=${product.id})}" method="post" class="inline-block w-full">
                                    <button type="submit" class="w-full py-2 rounded-lg"
                                            th:classappend="${favoriteProductIds.contains(product.id)} ? ' bg-pink-600 text-white hover:bg-pink-700' : ' bg-pink-100 text-pink-700 hover:bg-pink-200'"
                                            th:text="${favoriteProductIds.contains(product.id)} ? 'Unfavorite' : 'Add to Favorites'"></button>
                                </form>
                                <form th:if="${authenticated}" th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="inline-block w-full">
                                    <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
                                        Add to Cart
                                    </button>
                                </form>
                                <a th:unless="${authenticated}" href="/login"
                                   class="block w-full bg-gray-200 text-gray-700 text-center py-2 rounded-lg hover:bg-gray-300">
                                   Login to Buy
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${products.isEmpty()}" class="text-center py-12">
                    <p class="text-gray-600 text-lg">No products found</p>
                </div>

                <div th:if="${totalPages > 1}" class="mt-8 flex items-center justify-center gap-2">
                    <a th:if="${currentPage > 0 and listType == 'all'}"
                       th:href="@{/products(page=${currentPage - 1},size=${pageSize})}"
                       class="px-3 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Previous</a>
                    <a th:if="${currentPage > 0 and listType == 'category'}"
                       th:href="@{/products/category/{id}(id=${currentCategoryId},page=${currentPage - 1},size=${pageSize})}"
                       class="px-3 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Previous</a>
                    <a th:if="${currentPage > 0 and listType == 'search'}"
                       th:href="@{/products/search(query=${searchQuery},page=${currentPage - 1},size=${pageSize})}"
                       class="px-3 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Previous</a>

                    <span th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}">
                        <a th:if="${listType == 'all'}"
                           th:href="@{/products(page=${pageNumber},size=${pageSize})}"
                           th:text="${pageNumber + 1}"
                           th:classappend="${pageNumber == currentPage} ? ' bg-blue-600 text-white border-blue-600' : ' bg-white text-gray-700 border-gray-300 hover:bg-gray-100'"
                           class="inline-block min-w-10 text-center px-3 py-2 rounded-lg border"></a>
                        <a th:if="${listType == 'category'}"
                           th:href="@{/products/category/{id}(id=${currentCategoryId},page=${pageNumber},size=${pageSize})}"
                           th:text="${pageNumber + 1}"
                           th:classappend="${pageNumber == currentPage} ? ' bg-blue-600 text-white border-blue-600' : ' bg-white text-gray-700 border-gray-300 hover:bg-gray-100'"
                           class="inline-block min-w-10 text-center px-3 py-2 rounded-lg border"></a>
                        <a th:if="${listType == 'search'}"
                           th:href="@{/products/search(query=${searchQuery},page=${pageNumber},size=${pageSize})}"
                           th:text="${pageNumber + 1}"
                           th:classappend="${pageNumber == currentPage} ? ' bg-blue-600 text-white border-blue-600' : ' bg-white text-gray-700 border-gray-300 hover:bg-gray-100'"
                           class="inline-block min-w-10 text-center px-3 py-2 rounded-lg border"></a>
                    </span>

                    <a th:if="${currentPage < totalPages - 1 and listType == 'all'}"
                       th:href="@{/products(page=${currentPage + 1},size=${pageSize})}"
                       class="px-3 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Next</a>
                    <a th:if="${currentPage < totalPages - 1 and listType == 'category'}"
                       th:href="@{/products/category/{id}(id=${currentCategoryId},page=${currentPage + 1},size=${pageSize})}"
                       class="px-3 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Next</a>
                    <a th:if="${currentPage < totalPages - 1 and listType == 'search'}"
                       th:href="@{/products/search(query=${searchQuery},page=${currentPage + 1},size=${pageSize})}"
                       class="px-3 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">Next</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-12">
        <p>&copy; 2024 TechEcom. All rights reserved.</p>
    </footer>
</body>
</html>
