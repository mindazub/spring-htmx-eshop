<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success - TechEcom</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<main class="max-w-2xl mx-auto px-4 py-16">
    <div class="bg-white rounded-lg shadow-md p-8 text-center">
        <div class="text-5xl mb-4">✅</div>
        <h1 class="text-3xl font-bold mb-2">Payment Completed</h1>
        <p class="text-gray-600 mb-6">This was a fake payment for demo/testing only.</p>

        <div class="bg-gray-50 rounded-lg p-4 text-left mb-6">
            <p class="text-sm text-gray-500">Payment ID</p>
            <p class="font-mono" th:text="${checkoutResult.paymentId()}"></p>
            <p class="text-sm text-gray-500 mt-3">Paid At</p>
            <p th:text="${checkoutResult.paidAt()}"></p>
            <p class="text-sm text-gray-500 mt-3">Amount</p>
            <p class="text-xl font-bold text-blue-600" th:text="'$' + ${#numbers.formatDecimal(checkoutResult.totalAmount(), 1, 2)}"></p>
        </div>

        <div class="flex justify-center gap-3">
            <a href="/products" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700">Continue Shopping</a>
            <a href="/cart" class="bg-gray-200 text-gray-700 px-5 py-2 rounded-lg hover:bg-gray-300">View Cart</a>
        </div>
    </div>
</main>
</body>
</html>
