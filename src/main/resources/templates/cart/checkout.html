<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - TechEcom</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <h1 class="text-2xl font-bold text-blue-600">TechEcom</h1>
            <a href="/products" class="text-gray-700 hover:text-blue-600">Products</a>
            <a href="/cart" class="text-gray-700 hover:text-blue-600">Cart</a>
        </div>
        <div class="flex items-center space-x-4">
            <a th:if="${admin}" href="/admin" class="text-gray-700 hover:text-blue-600 font-semibold">Admin</a>
            <a href="/account" class="text-gray-700 hover:text-blue-600 font-semibold">My Account</a>
            <span class="text-gray-700" th:text="${currentUserEmail}"></span>
            <form action="/logout" method="post" class="inline">
                <button type="submit" class="text-red-600 hover:text-red-700">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-2">Fake Checkout</h1>
    <p class="text-gray-600 mb-6">Use test card <strong>42424242</strong> (or <strong>4242 4242 4242 4242</strong>) to simulate successful payment.</p>

    <div th:if="${cartMessage != null}" class="mb-4 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-green-800" th:text="${cartMessage}"></div>
    <div th:if="${cartError != null}" class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-800" th:text="${cartError}"></div>

    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
        <h2 class="text-xl font-semibold mb-4">Order Total</h2>
        <div class="flex justify-between text-lg">
            <span>Subtotal</span>
            <span th:text="'$' + ${#numbers.formatDecimal(checkoutTotal, 1, 2)}"></span>
        </div>
    </div>

    <form action="/cart/checkout" method="post" class="bg-white rounded-lg shadow-md p-6 space-y-4">
        <div>
            <label for="cardHolder" class="block text-gray-700 mb-1">Card Holder</label>
            <input id="cardHolder" name="cardHolder" type="text" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600">
        </div>

        <div>
            <label for="cardNumber" class="block text-gray-700 mb-1">Card Number</label>
            <input id="cardNumber" name="cardNumber" type="text" required placeholder="42424242" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600">
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div>
                <label for="expiryMonth" class="block text-gray-700 mb-1">MM</label>
                <input id="expiryMonth" name="expiryMonth" type="text" required maxlength="2" placeholder="12" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600">
            </div>
            <div>
                <label for="expiryYear" class="block text-gray-700 mb-1">YY</label>
                <input id="expiryYear" name="expiryYear" type="text" required maxlength="2" placeholder="30" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600">
            </div>
            <div>
                <label for="cvc" class="block text-gray-700 mb-1">CVC</label>
                <input id="cvc" name="cvc" type="text" required maxlength="4" placeholder="123" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-600">
            </div>
        </div>

        <button type="submit" class="w-full bg-green-600 text-white font-semibold py-3 rounded-lg hover:bg-green-700">
            Pay Now
        </button>
    </form>
</main>
</body>
</html>
